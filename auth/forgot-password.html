<!DOCTYPE html>
<html lang="ar">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>تربة | استعادة كلمة المرور</title>
        <link rel="icon" type="image/png" href="/favicon.png">
        <link rel="stylesheet" href="../style.css">
    </head>
    <body class="backdrop-brightness-75 bg-about-us bg-cover bg-no-repeat backdrop-blur grid grid-rows-[auto,1fr] h-screen overflow-hidden">
        <div class="pt-5 pr-3 sm:p-6" dir="rtl">
            <a href="https://yazn-108.github.io/torbah/" class="rounded-md bg-gray-100 px-5 py-2.5 w-fit text-[#0478c1]">الصفحة الرئيسية</a>
        </div>
        <div class="font-[sans-serif] text-white">
            <div class="flex fle-col items-center justify-center py-6 px-4 h-full">
                <div class="grid md:grid-cols-2 items-center gap-10 max-w-6xl w-full">
                    <div class="text-center max-sm:hidden">
                        <h2 class="lg:text-5xl text-3xl font-normal lg:leading-[55px]">
                            تمتع بنظام ري ذكي
                        </h2>
                        <p class="text-xl mt-6">
                            ابدء في جعل نظام الري الخاص بك
                            اكثر ذكاء
                        </p>
                        <p class="text-sm mt-10">
                            عودة لصفحة
                            <a href="https://yazn-108.github.io/torbah/login.html" class=" font-semibold underline ml-1">تسجيل الدخول</a>
                        </p>
                    </div>
                    <form class="space-y-6 max-w-md md:ml-auto max-md:mx-auto w-full">
                        <h3 class="text-white text-2xl font-bold mb-8 text-center">
                            استعادة كلمة المرور
                        </h3>
                        <div>
                            <input
                                dir="rtl"
                                name="email"
                                type="email"
                                autocomplete="email"
                                required
                                class="text-[#333] bg-gray-100 w-full text-sm px-4 py-3.5 rounded-md border-2 focus:border-[#0478c1] outline-none"
                                placeholder="البريد الالكتروني"
                            >
                        </div>
                        <div class="!mt-10">
                            <button type="submit" class="w-full shadow-xl py-2.5 px-4 text-sm font-semibold rounded text-white bg-[#0478c1] focus:outline-none">
                                تسجيل الدخول
                            </button>
                        </div>
                        <p class="sm:hidden text-sm mt-10 text-center">
                            عودة لصفحة
                            <a href="https://yazn-108.github.io/torbah/login.html" class=" font-semibold underline ml-1">
                                تسجيل الدخول
                            </a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </body>
</html>
